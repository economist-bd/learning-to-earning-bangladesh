<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="লার্নিং টু আর্নিং বাংলাদেশ - মোঃ মঞ্জুরুল হক এর ২ বছর পূর্তি উপলক্ষ্য। দক্ষতা শিখুন এবং আয় করুন।">
    <meta name="keywords" content="শিক্ষা, দক্ষতা উন্নয়ন, বাংলা, অনলাইন কোর্স, মঞ্জুরুল হক">
    
    <!-- OG Tags -->
    <meta property="og:title" content="লার্নিং টু আর্নিং বাংলাদেশ - ২ বছর পূর্তি">
    <meta property="og:description" content="মোঃ মঞ্জুরুল হক এর ২ বছর পূর্তি উপলক্ষে। দক্ষতা শিখুন এবং আয় করুন।">
    <meta property="og:image" content="https://via.placeholder.com/1200x630/667eea/ffffff?text=Learning+To+Earning">
    <meta property="og:url" content="https://learning-to-earning.vercel.app">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="bn_BD">
    
    <!-- Twitter Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="লার্নিং টু আর্নিং বাংলাদেশ">
    <meta name="twitter:description" content="২ বছর পূর্তি উপলক্ষ্য বিশেষ অফার">
    
    <title>লার্নিং টু আর্নিং বাংলাদেশ | ২ বছর পূর্তি</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f0f2f5;
            -webkit-user-select: none;
            user-select: none;
        }

        /* স্প্লাশ স্ক্রীন */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            overflow: hidden;
        }

        .splash-screen.hidden {
            animation: fadeOut 0.5s ease-out forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .social-burst {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .social-icon {
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            font-size: 28px;
            backdrop-filter: blur(10px);
            animation: burst 1.5s ease-out forwards;
        }

        @keyframes burst {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1);
                opacity: 0;
            }
        }

        /* মূল কন্টেন্ট */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            overflow: hidden;
        }

        .container.hidden {
            display: none;
        }

        /* নেভিগেশন */
        nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: rgba(102, 126, 234, 0.2);
        }

        /* মূল সামগ্রী */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 10px;
        }

        /* মর্ফিক কার্ড */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            transition: all 0.3s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .hero-card {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
        }

        .hero-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
            font-weight: 700;
        }

        .hero-card .subtitle {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .view-count {
            display: inline-block;
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
        }

        /* স্ট্যাটিস্টিক্স গ্রিড */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        /* মিডিয়া কন্টেন্ট */
        .media-container {
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .media-container img,
        .media-container video {
            width: 100%;
            display: block;
        }

        /* কমেন্ট সেকশন */
        .comments-section {
            margin-top: 20px;
        }

        .comment-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .comment-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.8);
            font-family: inherit;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .comment-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }

        .comment-btn:active {
            transform: scale(0.95);
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.5);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }

        .comment-name {
            font-weight: 600;
            color: #667eea;
            font-size: 13px;
        }

        .comment-text {
            color: #333;
            margin-top: 5px;
            font-size: 13px;
            line-height: 1.4;
        }

        /* অ্যাডমিন প্যানেল */
        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: flex-end;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .admin-modal.active {
            display: flex;
        }

        .admin-sheet {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px 25px 0 0;
            padding: 30px 20px 20px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .admin-header h2 {
            color: #667eea;
            font-size: 20px;
        }

        .close-admin {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: none;
            cursor: pointer;
            color: #999;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .color-option {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .color-option.selected {
            border-color: #333;
            transform: scale(1.1);
        }

        .text-decorations {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .decoration-btn {
            padding: 8px 12px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s;
        }

        .decoration-btn.active {
            background: #667eea;
            color: white;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input {
            position: absolute;
            left: -9999px;
        }

        .file-label {
            display: block;
            padding: 12px;
            background: rgba(102, 126, 234, 0.1);
            border: 2px dashed rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            color: #667eea;
            font-weight: 600;
            transition: all 0.3s;
        }

        .file-label:active {
            background: rgba(102, 126, 234, 0.2);
        }

        .preview-img {
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            max-height: 200px;
            object-fit: cover;
        }

        /* বাটন */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        /* ফুটার */
        footer {
            background: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* মোবাইল শুধু */
        @media (min-width: 480px) {
            body::before {
                content: "এই পেজটি শুধুমাত্র মোবাইলে দেখা যাবে";
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100vw;
                height: 100vh;
                background: #333;
                color: white;
                font-size: 18px;
                position: fixed;
                top: 0;
                left: 0;
                z-index: 10000;
            }
            .splash-screen, .container {
                display: none;
            }
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- স্প্লাশ স্ক্রীন -->
    <div class="splash-screen" id="splashScreen">
        <div class="social-burst" id="socialBurst"></div>
    </div>

    <!-- মূল কন্টেইনার -->
    <div class="container" id="mainContainer">
        <!-- নেভিগেশন -->
        <nav>
            <div class="logo">লার্নিং টু আর্নিং 🚀</div>
            <div class="nav-actions">
                <button class="icon-btn" onclick="refreshPage()">🔄</button>
                <button class="icon-btn" onclick="openAdminPanel()">⚙️</button>
            </div>
        </nav>

        <!-- কন্টেন্ট -->
        <div class="content" id="mainContent">
            <div class="hero-card card">
                <h1 id="pageTitle">লার্নিং টু আর্নিং বাংলাদেশ</h1>
                <div class="subtitle" id="pageSubtitle">মোঃ মঞ্জুরুল হক | ২ বছর পূর্তি</div>
                <div class="view-count">👁️ <span id="viewCount">200000</span> ভিউ</div>
            </div>

            <!-- স্ট্যাটিস্টিক্স -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-item">
                    <div class="stat-number" id="stat1">৫০০+</div>
                    <div class="stat-label">শিক্ষার্থী</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="stat2">১০+</div>
                    <div class="stat-label">কোর্স</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="stat3">১০০০+</div>
                    <div class="stat-label">ঘন্টা</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="stat4">২</div>
                    <div class="stat-label">বছর</div>
                </div>
            </div>

            <!-- ডায়নামিক কন্টেন্ট এরিয়া -->
            <div id="dynamicContent"></div>

            <!-- কমেন্ট সেকশন -->
            <div class="comments-section card">
                <h3 style="margin-bottom: 15px; color: #333;">💬 মন্তব্য করুন</h3>
                <div class="comment-input-group">
                    <input type="text" class="comment-input" id="commentName" placeholder="আপনার নাম">
                    <button class="comment-btn" onclick="addComment()">📤</button>
                </div>
                <textarea class="comment-input" id="commentText" placeholder="আপনার মন্তব্য লিখুন..." style="width: 100%; margin-bottom: 10px;"></textarea>
                <button class="btn btn-primary" onclick="submitComment()">মন্তব্য করুন</button>
                <div id="commentsList" style="margin-top: 15px;"></div>
            </div>
        </div>

        <!-- ফুটার -->
        <footer>
            <p>© ২০২৪ লার্নিং টু আর্নিং বাংলাদেশ | মেন্টর: মোঃ মঞ্জুরুল হক</p>
        </footer>
    </div>

    <!-- অ্যাডমিন প্যানেল -->
    <div class="admin-modal" id="adminModal">
        <div class="admin-sheet">
            <div class="admin-header">
                <h2>📊 অ্যাডমিন প্যানেল</h2>
                <button class="close-admin" onclick="closeAdminPanel()">✕</button>
            </div>

            <!-- লগইন -->
            <div id="adminLogin" style="margin-bottom: 20px;">
                <div class="form-group">
                    <label>অ্যাডমিন পাসওয়ার্ড</label>
                    <input type="password" id="adminPassword" placeholder="পাসওয়ার্ড লিখুন">
                </div>
                <button class="btn btn-primary" onclick="verifyAdmin()">প্রবেশ করুন</button>
            </div>

            <!-- অ্যাডমিন প্যানেল -->
            <div id="adminPanel" style="display: none;">
                <div class="admin-tabs">
                    <button class="tab-btn active" onclick="switchTab('content')">📝 কন্টেন্ট</button>
                    <button class="tab-btn" onclick="switchTab('stats')">📊 পরিসংখ্যান</button>
                    <button class="tab-btn" onclick="switchTab('settings')">⚙️ সেটিংস</button>
                </div>

                <!-- কন্টেন্ট ট্যাব -->
                <div id="content-tab" class="tab-content active">
                    <div class="form-group">
                        <label>পেজ শিরোনাম</label>
                        <input type="text" id="titleInput" placeholder="শিরোনাম">
                    </div>

                    <div class="form-group">
                        <label>পেজ বর্ণনা</label>
                        <input type="text" id="subtitleInput" placeholder="বর্ণনা">
                    </div>

                    <div class="form-group">
                        <label>মূল কন্টেন্ট</label>
                        <textarea id="mainContentInput" placeholder="মূল কন্টেন্ট লিখুন..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>টেক্সট কালার</label>
                        <div class="color-picker" id="colorPicker">
                            <div class="color-option selected" style="background: #333;" onclick="selectColor('#333')"></div>
                            <div class="color-option" style="background: #667eea;" onclick="selectColor('#667eea')"></div>
                            <div class="color-option" style="background: #764ba2;" onclick="selectColor('#764ba2')"></div>
                            <div class="color-option" style="background: #ff6b6b;" onclick="selectColor('#ff6b6b')"></div>
                            <div class="color-option" style="background: #4ecdc4;" onclick="selectColor('#4ecdc4')"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>টেক্সট সাজসজ্জা</label>
                        <div class="text-decorations">
                            <button class="decoration-btn" id="boldBtn" onclick="toggleDecoration('bold')"><strong>বোল্ড</strong></button>
                            <button class="decoration-btn" id="italicBtn" onclick="toggleDecoration('italic')"><em>ইটালিক</em></button>
                            <button class="decoration-btn" id="underlineBtn" onclick="toggleDecoration('underline')"><u>আন্ডার</u></button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>ছবি / ভিডিও আপলোড</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="mediaInput" accept="image/*,video/*" onchange="previewMedia()">
                            <label class="file-label" for="mediaInput">📁 ফাইল নির্বাচন করুন অথবা ড্র্যাগ করুন</label>
                        </div>
                        <img id="mediaPreview" class="preview-img" style="display: none;">
                    </div>

                    <div class="form-group">
                        <label>ছবি/ভিডিও URL</label>
                        <input type="text" id="mediaUrl" placeholder="https://example.com/image.jpg">
                    </div>

                    <button class="btn btn-primary" onclick="saveContent()">কন্টেন্ট সংরক্ষণ করুন</button>
                </div>

                <!-- পরিসংখ্যান ট্যাব -->
                <div id="stats-tab" class="tab-content">
                    <div class="form-group">
                        <label>মোট দর্শন</label>
                        <input type="number" id="viewCountInput" placeholder="মোট দর্শন" value="200000">
                    </div>

                    <div class="form-group">
                        <label>শিক্ষার্থী</label>
                        <input type="number" id="stat1Input" placeholder="শিক্ষার্থী সংখ্যা">
                    </div>

                    <div class="form-group">
                        <label>কোর্স</label>
                        <input type="number" id="stat2Input" placeholder="কোর্স সংখ্যা">
                    </div>

                    <div class="form-group">
                        <label>প্রশিক্ষণ ঘন্টা</label>
                        <input type="number" id="stat3Input" placeholder="ঘন্টা">
                    </div>

                    <button class="btn btn-primary" onclick="saveStats()">পরিসংখ্যান সংরক্ষণ করুন</button>
                </div>

                <!-- সেটিংস ট্যাব -->
                <div id="settings-tab" class="tab-content">
                    <div class="form-group">
                        <label>OG ইমেজ URL</label>
                        <input type="text" id="ogImageInput" placeholder="https://example.com/og-image.jpg">
                    </div>

                    <div class="form-group">
                        <label>পেজ URL</label>
                        <input type="text" id="ogUrlInput" value="https://learning-to-earning.vercel.app">
                    </div>

                    <button class="btn btn-primary" onclick="saveSettings()">সেটিংস সংরক্ষণ করুন</button>

                    <div class="form-group" style="margin-top: 30px;">
                        <label>বিপজ্জনক অঞ্চল</label>
                        <button class="btn btn-secondary" style="margin-top: 10px;" onclick="clearAllData()">সব ডেটা মুছুন</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyCCgQ1qjU5num7QUw9u2pz0tNN7v2eX61Y",
            authDomain: "neera-d1df0.firebaseapp.com",
            projectId: "neera-d1df0",
            storageBucket: "neera-d1df0.firebasestorage.app",
            messagingSenderId: "745022493052",
            appId: "1:745022493052:web:c5f980b18ad6bdbdbc14f9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_PASSWORD = "2024admin";

        let currentTextColor = '#333';
        let textDecorations = { bold: false, italic: false, underline: false };

        // স্প্লাশ স্ক্রীন - সোশাল মিডিয়া বিস্ফোড়ন
        window.addEventListener('load', () => {
            createSocialBurst();
            setTimeout(() => {
                document.getElementById('splashScreen').classList.add('hidden');
                loadAllData();
            }, 2500);
        });

        function createSocialBurst() {
            const icons = ['📘', '📱', '🎥', '✨', '🌟', '💬', '👥', '🎯'];
            const burst = document.getElementById('socialBurst');
            
            icons.forEach((icon, i) => {
                const el = document.createElement('div');
                el.className = 'social-icon';
                el.textContent = icon;
                
                const angle = (i / icons.length) * Math.PI * 2;
                const distance = 200;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                el.style.setProperty('--tx', x + 'px');
                el.style.setProperty('--ty', y + 'px');
                
                burst.appendChild(el);
            });
        }

        function loadAllData() {
            db.ref('page_data').once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('pageTitle').textContent = data.title || 'লার্নিং টু আর্নিং বাংলাদেশ';
                    document.getElementById('pageSubtitle').textContent = data.subtitle || 'মোঃ মঞ্জুরুল হক | ২ বছর পূর্তি';
                    
                    if (data.mainContent) {
                        let contentHtml = `<div class="card" style="color: ${data.textColor || '#333'};">`;
                        let content = data.mainContent;
                        if (data.bold) content = `<strong>${content}</strong>`;
                        if (data.italic) content = `<em>${content}</em>`;
                        if (data.underline) content = `<u>${content}</u>`;
                        contentHtml += content;
                        contentHtml += '</div>';
                        document.getElementById('dynamicContent').innerHTML = contentHtml;
                    }
                    
                    if (data.mediaUrl) {
                        const mediaHtml = data.mediaUrl.includes('.mp4') || data.mediaUrl.includes('video') 
                            ? `<div class="media-container card"><video controls><source src="${data.mediaUrl}"></video></div>`
                            : `<div class="media-container card"><img src="${data.mediaUrl}" alt="কন্টেন্ট"></div>`;
                        document.getElementById('dynamicContent').innerHTML += mediaHtml;
                    }
                }
            });

            db.ref('statistics').once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const stats = snapshot.val();
                    document.getElementById('stat1').textContent = stats.students || '৫০০+';
                    document.getElementById('stat2').textContent = stats.courses || '১০+';
                    document.getElementById('stat3').textContent = stats.hours || '১০০০+';
                }
            });

            db.ref('view_count').once('value', (snapshot) => {
                const count = snapshot.val() || 200000;
                document.getElementById('viewCount').textContent = count;
            });

            loadComments();
        }

        function loadComments() {
            db.ref('comments').once('value', (snapshot) => {
                const commentsList = document.getElementById('commentsList');
                commentsList.innerHTML = '';
                
                if (snapshot.exists()) {
                    const comments = snapshot.val();
                    Object.entries(comments).forEach(([key, comment]) => {
                        const div = document.createElement('div');
                        div.className = 'comment-item';
                        div.innerHTML = `
                            <div class="comment-name">${comment.name}</div>
                            <div class="comment-text">${comment.text}</div>
                        `;
                        commentsList.appendChild(div);
                    });
                }
            });
        }

        function submitComment() {
            const name = document.getElementById('commentName').value || 'অজানা ব্যবহারকারী';
            const text = document.getElementById('commentText').value;
            
            if (!text.trim()) {
                alert('মন্তব্য লিখুন!');
                return;
            }

            const newComment = {
                name,
                text,
                timestamp: new Date().toISOString()
            };

            db.ref('comments').push(newComment).then(() => {
                document.getElementById('commentName').value = '';
                document.getElementById('commentText').value = '';
                loadComments();
                alert('আপনার মন্তব্য যোগ করা হয়েছে!');
            });
        }

        function addComment() {
            submitComment();
        }

        function openAdminPanel() {
            document.getElementById('adminModal').classList.add('active');
        }

        function closeAdminPanel() {
            document.getElementById('adminModal').classList.remove('active');
            document.getElementById('adminLogin').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        function verifyAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminData();
            } else {
                alert('পাসওয়ার্ড ভুল!');
            }
        }

        function loadAdminData() {
            db.ref('page_data').once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('titleInput').value = data.title || '';
                    document.getElementById('subtitleInput').value = data.subtitle || '';
                    document.getElementById('mainContentInput').value = data.mainContent || '';
                    document.getElementById('mediaUrl').value = data.mediaUrl || '';
                }
            });

            db.ref('statistics').once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const stats = snapshot.val();
                    document.getElementById('stat1Input').value = stats.students || '';
                    document.getElementById('stat2Input').value = stats.courses || '';
                    document.getElementById('stat3Input').value = stats.hours || '';
                }
            });

            db.ref('view_count').once('value', (snapshot) => {
                document.getElementById('viewCountInput').value = snapshot.val() || 200000;
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function selectColor(color) {
            currentTextColor = color;
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function toggleDecoration(type) {
            textDecorations[type] = !textDecorations[type];
            document.getElementById(type + 'Btn').classList.toggle('active');
        }

        function previewMedia() {
            const file = document.getElementById('mediaInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('mediaPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('mediaUrl').value = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveContent() {
            const data = {
                title: document.getElementById('titleInput').value,
                subtitle: document.getElementById('subtitleInput').value,
                mainContent: document.getElementById('mainContentInput').value,
                mediaUrl: document.getElementById('mediaUrl').value,
                textColor: currentTextColor,
                bold: textDecorations.bold,
                italic: textDecorations.italic,
                underline: textDecorations.underline
            };

            db.ref('page_data').set(data).then(() => {
                alert('কন্টেন্ট সংরক্ষিত হয়েছে!');
                loadAllData();
            });
        }

        function saveStats() {
            const data = {
                students: document.getElementById('stat1Input').value,
                courses: document.getElementById('stat2Input').value,
                hours: document.getElementById('stat3Input').value
            };

            db.ref('statistics').set(data).then(() => {
                alert('পরিসংখ্যান সংরক্ষিত হয়েছে!');
                loadAllData();
            });

            const viewCount = parseInt(document.getElementById('viewCountInput').value) || 200000;
            db.ref('view_count').set(viewCount);
        }

        function saveSettings() {
            const ogImage = document.getElementById('ogImageInput').value;
            const ogUrl = document.getElementById('ogUrlInput').value;

            db.ref('settings').set({
                ogImage,
                ogUrl
            }).then(() => {
                alert('সেটিংস সংরক্ষিত হয়েছে!');
                // OG ট্যাগ আপডেট করুন
                document.querySelector('meta[property="og:image"]').setAttribute('content', ogImage);
                document.querySelector('meta[property="og:url"]').setAttribute('content', ogUrl);
            });
        }

        function clearAllData() {
            if (confirm('সত্যিই সব ডেটা মুছতে চান? এটি পূর্বাবাস করা যাবে না!')) {
                db.ref().remove().then(() => {
                    alert('সব ডেটা মুছে দেওয়া হয়েছে!');
                    location.reload();
                });
            }
        }

        function refreshPage() {
            loadAllData();
        }
    </script>
</body>
</html>
